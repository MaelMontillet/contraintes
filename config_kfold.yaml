model_name: "dimenet++"

emb_size: 128
out_emb_size: 256
int_emb_size: 64        # 32→64: more expressive interaction triplets
basis_emb_size: 8
num_blocks: 4

num_spherical: 7
num_radial: 6
output_init: 'GlorotOrthogonal'

extensive: True
cutoff: 5.0
envelope_exponent: 5
dropout_rate: 0.1       # regularisation for small dataset (3306 samples)

num_before_skip: 1
num_after_skip: 2
num_dense_output: 3

# K-fold settings
n_folds: 5
data_seed: 42           # seed for fold splitting
num_samples: 3306       # total training molecules

logdir: "../checkpoints"

# Training (per fold; steps are recomputed from epochs in the script)
epochs: 500
ema_decay: 0.999

learning_rate: 0.001    # conservative vs 0.003 — more stable with small data
warmup_prop: 0.03       # 3% of steps as warmup
decay_rate: 0.01
decay_prop: 1.25        # decay_steps = decay_prop * num_steps

target_scaling: True    # subtract per-atom linear baseline before training
batch_size: 16          # smaller batch → more gradient updates per epoch
evaluation_interval: 0  # 0 = auto: set to 1 epoch in the script
save_interval: 0        # same
early_stop: True
patience_epochs: 60     # stop if val MAE doesn't improve for 60 epochs
max_grad_norm: 10       # paper default (was 1000 — effectively disabled)

comment: "kfold5"
